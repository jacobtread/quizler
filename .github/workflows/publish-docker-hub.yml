name: Publish Docker image to Docker Hub

# Triggers
on:
    workflow_dispatch:
        inputs:
            release_tag:
                description: "Release tag to build the Docker image from including the 'v' prefix"
                required: true
                default: "v1.0.0"

permissions:
    contents: read
    packages: write

env:
    DOCKER_REPOSITORY: jacobtread/quizler

jobs:
    build-and-push-debian:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v7

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Log in to Docker Hub
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  username: ${{ secrets.DOCKER_HUB_USER }}
                  password: ${{ secrets.DOCKER_HUB_PASSWORD }}

            - name: Build and push multi-platform image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  context: .
                  file: ./containers/prebuilt.debian.Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  build-args: |
                      GITHUB_RELEASE_VERSION=${{ github.event.inputs.release_tag }}
                  tags: |
                      ${{ env.DOCKER_REPOSITORY }}:${{ github.event.inputs.release_tag }}
                      ${{ env.DOCKER_REPOSITORY }}:${{ github.event.inputs.release_tag }}-debian-prebuilt
                      ${{ env.DOCKER_REPOSITORY }}:${{ github.event.inputs.release_tag }}-debian
                      ${{ env.DOCKER_REPOSITORY }}:latest-debian-prebuilt
                      ${{ env.DOCKER_REPOSITORY }}:latest-debian
                      ${{ env.DOCKER_REPOSITORY }}:latest

    build-and-push-alpine:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v7

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Log in to Docker Hub
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  username: ${{ secrets.DOCKER_HUB_USER }}
                  password: ${{ secrets.DOCKER_HUB_PASSWORD }}

            - name: Build and push multi-platform image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  context: .
                  file: ./containers/prebuilt.alpine.Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  build-args: |
                      GITHUB_RELEASE_VERSION=${{ github.event.inputs.release_tag }}
                  tags: |
                      ${{ vars.DOCKER_REPOSITORY }}:${{ github.event.inputs.release_tag }}-alpine-prebuilt
                      ${{ vars.DOCKER_REPOSITORY }}:${{ github.event.inputs.release_tag }}-alpine
                      ${{ vars.DOCKER_REPOSITORY }}:latest-alpine-prebuilt
                      ${{ vars.DOCKER_REPOSITORY }}:latest-alpine
